# saslauthd LDAP config for ScyllaDB
# Replace all <PLACEHOLDER> values before deploying

ldap_servers: ldap://<LDAP_SERVER_IP>
ldap_search_base: dc=<DOMAIN>,dc=<TLD>
ldap_filter: (uid=%u)
ldap_bind_dn: cn=scylla-svc,dc=<DOMAIN>,dc=<TLD>
ldap_bind_pw: <SERVICE_ACCOUNT_PASSWORD>
ldap_scope: sub
ldap_use_sasl: no

# For LDAPS / Azure AD DS, uncomment:
# ldap_tls_cacert_file: /etc/ssl/certs/azure-adds-ca.crt
# ldap_tls_checkpeer: yes

ldap_attr_role: cn
ldap_timeout: 10
ldap_time_limit: 15
